version: '3.8'

services:
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-luxviajes-prod
    restart: always
    environment:
      - NODE_ENV=production
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_FILENAME=${DATABASE_FILENAME:-data.db}
      - HOST=0.0.0.0
      - PORT=1337
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      - strapi-data:/app/data
      - strapi-uploads:/app/public/uploads
    networks:
      - strapi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/admin"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

networks:
  strapi-network:
    driver: bridge

volumes:
  strapi-data:
    driver: local
  strapi-uploads:
    driver: local
